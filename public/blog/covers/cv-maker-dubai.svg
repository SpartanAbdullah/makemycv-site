  <text x="110" y="260" font-family="system-ui,-apple-system,sans-serif" font-size="72" font-weight="800" fill="white">CV Maker</text>
  <text x="110" y="340" font-family="system-ui,-apple-system,sans-serif" font-size="72" font-weight="800" fill="url(#accent)">Built for Dubai</text>
  <text x="113" y="415" font-family="system-ui,-apple-system,sans-serif" font-size="24" fill="rgba(255,255,255,0.6)">A free, ATS-clean CV builder for the UAE — in five minutes</text>
  <rect x="110" y="460" width="180" height="4" rx="2" fill="url(#accent)"/>
